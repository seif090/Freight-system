<section>
  <h2>Geofence Management</h2>
  <form (ngSubmit)="addGeofence()" style="max-width: 500px; margin-bottom: 1rem;">
    <label>Name:<br><input [(ngModel)]="newGeofence.name" name="name" required></label><br>
    <label>Latitude:<br><input type="number" [(ngModel)]="newGeofence.centerLatitude" name="centerLatitude" step="0.0001" required></label><br>
    <label>Longitude:<br><input type="number" [(ngModel)]="newGeofence.centerLongitude" name="centerLongitude" step="0.0001" required></label><br>
    <label>Radius (m):<br><input type="number" [(ngModel)]="newGeofence.radiusMeters" name="radiusMeters" required></label><br>
    <label>Active:<input type="checkbox" [(ngModel)]="newGeofence.isActive" name="isActive"></label><br>
    <button type="submit">Add Geofence</button>
  </form>
  <div *ngIf="message" class="info">{{ message }}</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <h3>Existing Geofences</h3>
  <table>
    <thead><tr><th>Name</th><th>Center</th><th>Radius</th><th>Active</th></tr></thead>
    <tbody>
      <tr *ngFor="let g of geofences">
        <td>{{ g.name }}</td>
        <td>{{ g.centerLatitude }} / {{ g.centerLongitude }}</td>
        <td>{{ g.radiusMeters }} m</td>
        <td>{{ g.isActive ? 'Yes' : 'No' }}</td>
      </tr>
    </tbody>
  </table>
</section>
