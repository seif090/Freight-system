<div>
  <h2>Dashboard</h2>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="dashboardData">
    <div class="cards">
      <div class="card">Total Shipments: {{ dashboardData.totalShipments }}</div>
      <div class="card">Total Customers: {{ dashboardData.totalCustomers }}</div>
    </div>

    <div class="charts">
      <div class="chart-box">
        <canvas #statusCanvas></canvas>
      </div>
      <div class="chart-box">
        <canvas #modeCanvas></canvas>
      </div>
    </div>

    <div class="chart-box">
      <h3>Monthly Shipments</h3>
      <ul>
        <li *ngFor="let item of (dashboardData.monthlyShipmentCount | keyvalue)">{{ item.key }}: {{ item.value }}</li>
      </ul>
    </div>

    <div class="chart-box">
      <h3>Top Customers by Invoice Value</h3>
      <ul>
        <li *ngFor="let c of dashboardData.topCustomers">{{ c.name }} ({{ c.totalInvoiced | number:'1.0-2' }})</li>
      </ul>
    </div>

    <div class="chart-box">
      <h3>Actions</h3>
      <button (click)="exportShipments('csv')">Export Shipments CSV</button>
      <button (click)="exportShipments('excel')">Export Shipments Excel</button>
    </div>
  </div>
</div>
