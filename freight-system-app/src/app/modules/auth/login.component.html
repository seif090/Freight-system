<div>
  <h2>تسجيل دخول</h2>
  <form (ngSubmit)="submit()">
    <label>
      المستخدم
      <input [(ngModel)]="username" name="username" required />
    </label>

    <label>
      كلمة المرور
      <input type="password" [(ngModel)]="password" name="password" required />
    </label>

    <button type="submit">دخول</button>
  </form>

  <div *ngIf="error" style="color:red">{{ error }}</div>
</div>
